function FontLoader() {
  useEffect(() => {
    const links = [
      "https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap",
      "https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200",
    ];
    links.forEach((href) => {
      if (!document.querySelector(`link[href="${href}"]`)) {
        const el = document.createElement("link");
        el.rel = "stylesheet";
        el.href = href;
        document.head.appendChild(el);
      }
    });
  }, []);
  return null;
}

/* ═══════════════════════════════════════════════════════════════
   PARTICLE CANVAS
═══════════════════════════════════════════════════════════════ */
function ParticleCanvas({ density = 0.5 }) {
  const ref = useRef(null);
  const raf = useRef(null);
  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    let W = (c.width = window.innerWidth), H = (c.height = window.innerHeight);
    const count = Math.floor((W * H) / 14000 * density);
    const P = Array.from({ length: count }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - .5) * .28, vy: (Math.random() - .5) * .28,
      r: Math.random() * 1.8 + .4,
      op: Math.random() * .45 + .1,
      ps: Math.random() * .02 + .005,
      pp: Math.random() * Math.PI * 2,
    }));
    const D = 115;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() * .001;
      for (let i = 0; i < P.length; i++) {
        for (let j = i + 1; j < P.length; j++) {
          const dx = P[i].x - P[j].x, dy = P[i].y - P[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < D) {
            ctx.beginPath(); ctx.moveTo(P[i].x, P[i].y); ctx.lineTo(P[j].x, P[j].y);
            ctx.strokeStyle = `rgba(0,229,255,${(1 - d / D) * .13})`; ctx.lineWidth = .5; ctx.stroke();
          }
        }
      }
      P.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const pulse = Math.sin(t * p.ps * 60 + p.pp) * .28 + .72;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${p.op * pulse})`; ctx.fill();
      });
      raf.current = requestAnimationFrame(draw);
    };
    draw();
    const resize = () => { W = c.width = window.innerWidth; H = c.height = window.innerHeight; };
    window.addEventListener("resize", resize);
    return () => { cancelAnimationFrame(raf.current); window.removeEventListener("resize", resize); };
  }, [density]);
  return <canvas ref={ref} style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, opacity: .7 }} />;
}

function CommandPalette({ onClose, nav }) {
  const [q, setQ] = useState("");
  const inp = useRef(null);
  const filtered = CMDS.filter(c => c.l.toLowerCase().includes(q.toLowerCase()));
  useEffect(() => {
    inp.current?.focus();
    const fn = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [onClose]);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="cmd" onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", padding: "14px 18px", borderBottom: "1px solid var(--border)", gap: 10 }}>
          <I n="search" s={16} c="var(--txt3)" />
          <input ref={inp} value={q} onChange={e => setQ(e.target.value)} placeholder="Type a command or search pages..."
            style={{ flex: 1, background: "none", border: "none", outline: "none", color: "var(--txt)", fontFamily: "var(--ff-body)", fontSize: 14 }} />
          <span className="chip chip-c" onClick={onClose} style={{ cursor: "pointer" }}>ESC</span>
        </div>
        <div style={{ maxHeight: 400, overflowY: "auto", padding: "6px 0" }}>
          {filtered.map((cmd, i) => (
            <div key={i} onClick={() => { nav(cmd.p); onClose(); }}
              style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 18px", cursor: "pointer", transition: "background var(--t-fast)" }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(0,229,255,0.05)"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <div className="icon-box" style={{ width: 30, height: 30, background: "rgba(0,229,255,0.07)", border: "1px solid var(--border)" }}>
                <I n={cmd.i} s={15} c="var(--cyan)" />
              </div>
              <span style={{ fontSize: 13, flex: 1 }}>{cmd.l}</span>
              <span className="chip chip-v" style={{ fontSize: 10 }}>{cmd.cat}</span>
            </div>
          ))}
          {!filtered.length && <div style={{ textAlign: "center", padding: "36px 20px", color: "var(--txt3)", fontFamily: "var(--ff-mono)", fontSize: 12 }}>// No results found</div>}
        </div>
      </div>
    </div>
  );
}

      <StatusBar />

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   PHASE 4C â€” THE ARENA (A/B Model Comparison)
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
function Arena({ nav }) {
  const [prompt, setPrompt] = useState("");
  const [running, setRunning] = useState(false);
  const [outA, setOutA] = useState("");
  const [outB, setOutB] = useState("");
  const [voted, setVoted] = useState(null);
  const [scores, setScores] = useState({ a:1247, b:1198 });

  const MODELS = [
    { id:"a", name:"Claude 3.5 Sonnet", provider:"Anthropic", elo:1247, color:"var(--cyan)" },

  ];

  const OUTS_A = [
    "The infrastructure bottleneck isn't compute â€” it's orchestration. We're throwing TPUs at problems that need better pipeline design.\n\nEvery team I've advised in the last year hit the same wall: they could train the model, but couldn't deploy it reliably. The unsexy truth is that MLOps matters more than model architecture for 90% of production use cases.",
    "Disagree. The real moat in AI isn't data or models â€” it's taste. Knowing what to build, for whom, and when.\n\nEvery week there's a new SOTA benchmark winner. But the products people actually use? They're built by teams with product sense, not just parameter counts.",
  ];
  const OUTS_B = [
    "I'd push back on this framing. Compute absolutely matters â€” but you're right that it's necessary, not sufficient.\n\nThe teams winning right now are the ones treating ML infrastructure as a first-class engineering discipline, not an afterthought. That means investing in CI/CD for models, automated evaluation pipelines, and real-time monitoring.\n\nThe future isn't more GPUs. It's smarter systems.",
    "There's a kernel of truth here, but it oversimplifies the landscape.\n\nProduct sense matters enormously â€” but without technical depth, you can't push the boundaries. The best teams have both: deep ML expertise paired with ruthless product prioritization.\n\nIt's not taste OR technology. It's taste AND technology.",
  ];

  const handleBattle = () => {
    if (!prompt.trim()) return;
    setRunning(true); setOutA(""); setOutB(""); setVoted(null);
    const sa = OUTS_A[Math.floor(Math.random()*OUTS_A.length)];
    const sb = OUTS_B[Math.floor(Math.random()*OUTS_B.length)];
    let i=0;
    const iv = setInterval(() => {
      i += 2;
      setOutA(sa.slice(0, i));
      setOutB(sb.slice(0, Math.min(i+8, sb.length)));
      if (i >= sa.length && i+8 >= sb.length) { clearInterval(iv); setRunning(false); }
    }, 15);

  const handleVote = (side) => {
    setVoted(side);
    setScores(p => ({ ...p, [side]: p[side] + 12 }));

  return (
    <div className="enter">

      </div>

      {/* Prompt input */}
      <div className="glass" style={{ padding:"18px 22px", marginBottom:18 }}>
        <div className="mono txt-2" style={{ fontSize:10, marginBottom:8 }}>BATTLE PROMPT</div>
        <div style={{ display:"flex", gap:10 }}>
          <input className="field" placeholder="Enter a prompt to compare model outputs..." value={prompt} onChange={e => setPrompt(e.target.value)}
            onKeyDown={e => { if (e.key==="Enter") handleBattle(); }} />
          <button className="btn-a" onClick={handleBattle} disabled={running || !prompt.trim()} style={{ whiteSpace:"nowrap" }}>
            {running ? <><span className="spinner" />Fighting...</> : <><I n="bolt" s={15} />Start Battle</>}
          </button>
        </div>
      </div>

      {/* Side-by-side output */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        {MODELS.map(m => {
          const out = m.id==="a" ? outA : outB;
          const isWinner = voted === m.id;
          const isLoser = voted && voted !== m.id;
          return (
            <div key={m.id} className="glass-hi" style={{ padding:"22px 24px", minHeight:280,

              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>

                  <span className="mono" style={{ fontSize:11, color:m.color }}>{m.name}</span>
                </div>
                <span className="chip" style={{ background:`${m.color}14`, color:m.color, border:`1px solid ${m.color}30` }}>{m.provider}</span>
              </div>
              {out ? (
                <>
                  <div style={{ fontSize:13.5, lineHeight:1.75, color:"var(--txt)", whiteSpace:"pre-wrap", marginBottom:16 }}>
                    {out}{running && <span className="blink txt-c">â–Œ</span>}
                  </div>
                  {!running && !voted && (
                    <button className="btn-p" onClick={() => handleVote(m.id)} style={{ width:"100%", justifyContent:"center", background:`linear-gradient(135deg,${m.color},var(--violet))` }}>
                      <I n="emoji_events" s={15} />Vote Winner
                    </button>
                  )}
                  {isWinner && <div className="chip chip-g" style={{ padding:"8px 16px", fontSize:12 }}><I n="emoji_events" s={14} c="var(--green)" />WINNER â€” ELO +12</div>}
                </>
              ) : (
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:160, color:"var(--txt3)" }}>
                  <div className="mono" style={{ fontSize:11 }}>Awaiting battle...</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* History */}
      <div className="glass" style={{ padding:"18px 22px", marginTop:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div className="mono txt-2" style={{ fontSize:10 }}>BATTLE HISTORY</div>
          <div style={{ display:"flex", gap:14 }}>
            {MODELS.map(m => (
              <span key={m.id} className="mono" style={{ fontSize:11, color:m.color }}>{m.name}: <strong>{m.id==="a"?scores.a:scores.b}</strong> ELO</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   PHASE 7B â€” LIVE AUDIO SYNC
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
function LiveAudio({ nav }) {
  const [recording, setRecording] = useState(false);
  const [transcript, setTranscript] = useState("");
  const canvasRef = useRef(null);
  const animRef = useRef(null);

  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const W = c.width = c.parentElement.offsetWidth;
    const H = c.height = 120;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      ctx.beginPath();
      for (let x = 0; x < W; x++) {
        const amp = recording ? 30 + Math.random() * 20 : 3;
        const y = H/2 + Math.sin(x*0.02 + Date.now()*0.003) * amp * Math.sin(x*0.01);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = recording ? "rgba(0,229,255,.6)" : "rgba(0,229,255,.15)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      animRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(animRef.current);
  }, [recording]);

  const SAMPLE_TRANSCRIPT = "The key insight here is that most teams are optimizing for the wrong metric. They're chasing benchmark scores when they should be measuring user satisfaction. The gap between SOTA performance and actual product-market fit is where all the opportunity lives right now.";

  const toggleRecord = () => {
    if (!recording) {
      setRecording(true); setTranscript("");
      let i = 0;
      const iv = setInterval(() => {
        i += 2;
        setTranscript(SAMPLE_TRANSCRIPT.slice(0, i));
        if (i >= SAMPLE_TRANSCRIPT.length) { clearInterval(iv); }
      }, 30);
    } else {
      setRecording(false);
    }
  };

  return (
    <div className="enter">
      <div style={{ marginBottom:22 }}>
        <div className="chip chip-a" style={{ marginBottom:8 }}>REAL-TIME</div>
        <h1 className="h-md">Live Audio <span className="txt-a">Sync</span></h1>
        <p className="txt-2" style={{ fontSize:13.5, marginTop:4 }}>Real-time voice transcription and AI response generation.</p>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:18 }}>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {/* Waveform */}
          <div className="glass-hi" style={{ padding:"24px 26px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <span className="mono txt-2" style={{ fontSize:10 }}>WAVEFORM VISUALIZER</span>
              {recording && <span className="chip chip-r" style={{ fontSize:9 }}><div style={{ width:6, height:6, borderRadius:"50%", background:"var(--red)", animation:"pulse 1s infinite" }} />RECORDING</span>}
            </div>
            <div style={{ position:"relative" }}>
              <canvas ref={canvasRef} style={{ width:"100%", height:120 }} />
            </div>
            <div style={{ display:"flex", justifyContent:"center", gap:12, marginTop:16 }}>
              <button className={recording ? "btn-a" : "btn-p"} onClick={toggleRecord} style={{ padding:"12px 28px" }}>
                <I n={recording ? "stop" : "mic"} s={16} />{recording ? "Stop Recording" : "Start Recording"}
              </button>
              <button className="btn-g" disabled={!transcript}><I n="auto_awesome" s={14} />Generate Reply</button>

const PUBLIC = ["landing", "login", "register", "onboarding", "calibrate", "features", "pricing", "changelog", "notfound"];

function App() {
  const [page, setPage] = useState("landing");
  const [key, setKey] = useState(0);

  const nav = useCallback((p) => {
    setPage(p);
    setKey(k => k + 1);
    window.scrollTo(0, 0);
  }, []);

  const isPublic = PUBLIC.includes(page);

  return (
    <>
      <FontLoader />
      <style dangerouslySetInnerHTML={{ __html: CSS }} />
      {isPublic ? (
        <div key={key}>
          {page === "landing" && <Landing nav={nav} />}
          {page === "login" && <Login nav={nav} />}
          {page === "register" && <Register nav={nav} />}
          {page === "onboarding" && <Onboarding nav={nav} />}
          {page === "calibrate" && <Calibrate nav={nav} />}
          {page === "features" && <FeaturesPage nav={nav} />}
          {page === "pricing" && <PricingPage nav={nav} />}
          {page === "changelog" && <Changelog nav={nav} />}
          {page === "notfound" && <NotFound nav={nav} />}
        </div>
      ) : (
        <Shell cur={page} nav={nav} title={PAGES[page]?.title || "Shadow Node"}>
          <div key={key}>
            {PAGES[page] ? PAGES[page].comp(nav) : <NotFound nav={nav} />}
          </div>
        </Shell>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
